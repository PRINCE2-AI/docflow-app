<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo {
      width: 22px;
      height: 22px;
      background: #2563eb;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled {
      opacity: 0.35;
      cursor: default;
    }
    #startBtn { background: #2563eb; color: #fff; }
    #startBtn:not(:disabled):hover { background: #1d4ed8; }
    #stopBtn  { background: #ef4444; color: #fff; }
    #stopBtn:not(:disabled):hover  { background: #dc2626; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 20px;
      text-align: center;
      color: #6b7280;
    }
    #status.capturing { color: #2563eb; }
    #status.success   { color: #16a34a; font-weight: 600; font-size: 13px; }

    /* live counter badge */
    #badge {
      display: none;
      margin-top: 10px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: #1d4ed8;
      text-align: center;
    }
    #badge.visible { display: block; }

    /* guide result card */
    #guideCard {
      display: none;
      margin-top: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 8px 10px;
    }
    #guideCard.visible { display: block; }
    #guideCard p {
      font-size: 12px;
      color: #15803d;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #guideCard a {
      font-size: 11px;
      color: #2563eb;
      text-decoration: none;
      word-break: break-all;
    }
    #guideCard a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="logo">DF</div>
    <h1>Step Capture</h1>
  </header>

  <div class="buttons">
    <button id="startBtn">&#9654; Start</button>
    <button id="stopBtn" disabled>&#9632; Stop</button>
  </div>

  <div id="badge"></div>
  <div id="status"></div>
  <div id="guideCard">
    <p>&#10003; Guide created!</p>
    <a id="guideLink" href="#" target="_blank">View guide &#8594;</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
